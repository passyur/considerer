# Name uniquely identifies this experiment. Change it when you run a new one.
# Responses are keyed by name, so renaming effectively starts a fresh dataset.
name: "Trolley Problem"

question: "Would you pull the lever?"

# answer_type: "choice"  — respondents click a button
# answer_type: "freetext" — respondents type a free-form answer
answer_type: choice

# Only used when answer_type is "choice"
answer_options:
  - "Yes"
  - "No"

variants:
  A:
    title: "Classic Trolley Problem"
    text: |
      A runaway trolley is speeding toward 5 people tied to the tracks.
      You are standing next to a lever. If you pull it, the trolley will
      be diverted to a side track where only 1 person is tied.

      You can pull the lever (killing 1) or do nothing (killing 5).

  B:
    title: "Footbridge Dilemma"
    text: |
      A runaway trolley is speeding toward 5 people tied to the tracks.
      You are standing on a footbridge above the tracks, next to a large
      stranger. The only way to stop the trolley is to push him off the
      bridge onto the tracks below — his body will stop it, but he will die.

      You can push the stranger (killing 1) or do nothing (killing 5).
